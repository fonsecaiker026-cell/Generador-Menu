name: Backend CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install fastapi "uvicorn[standard]" pytest reportlab httpx
          fi

      - name: Compile check
        run: python -m compileall -q src api_server.py tests

      - name: Run tests
        run: pytest -q

  test-frontend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Run frontend tests (if available)
        shell: bash
        run: |
          if npm run | grep -qE '(^|[[:space:]])test($|[[:space:]:])'; then
            npm run test
          else
            echo "No frontend test script found, skipping."
          fi
